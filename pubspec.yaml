name: up_police_hrms
description: "उत्तर प्रदेश पुलिस · कर्मचारी प्रबंधन प्रणाली — Enterprise HRMS"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.1

  # State management
  provider: ^6.1.2

  # CSV parsing — robust handling of quoted fields, embedded newlines
  # (ALT+ENTER multiline cells), escaped quotes. Replaces the hand-rolled
  # parser in GSheetDataSource for production robustness.
  csv: ^6.0.0

  # PDF generation & printing
  pdf: ^3.11.0
  printing: 5.14.3

  # Date / locale formatting
  intl: any

  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/